<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏀 Today's College Hoops</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .game-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .game-card:hover { transform: translateY(-3px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen px-4 py-10">

  <div class="max-w-4xl mx-auto mb-10 text-center">
    <h1 class="text-5xl font-black tracking-tight text-gray-900">🏀 College Hoops Today</h1>
    <p id="date-display" class="text-gray-400 mt-2 text-lg"></p>
  </div>

  <div id="games-container" class="max-w-4xl mx-auto grid gap-5">
    <p class="text-center text-gray-400 animate-pulse">Loading today's games...</p>
  </div>

  <p class="text-center text-gray-300 text-xs mt-12">Data via ESPN · Odds via The Odds API</p>

  <script>
    const ODDS_API_KEY = "8753ccc038eb27ba065e0f4d25d57081";

    function getDateParam() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}${month}${day}`;
    }

    const ESPN_URL = `https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${getDateParam()}`;
    const ODDS_URL = `https://api.the-odds-api.com/v4/sports/basketball_ncaab/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=spreads&oddsFormat=american`;

    document.getElementById("date-display").textContent = new Date().toLocaleDateString("en-US", {
      weekday: "long", year: "numeric", month: "long", day: "numeric"
    });

    // ---- ESPN stats helpers ----
    function toFlatStatMap(statsPayload) {
      const map = {};

      const addStatArray = (arr) => {
        if (!Array.isArray(arr)) return;
        for (const s of arr) {
          if (!s) continue;
          const name = s.name || s.shortName || s.abbreviation || s.displayName;
          const value = s.value ?? s.displayValue;
          if (name != null && value != null) map[String(name)] = value;
        }
      };

      addStatArray(statsPayload?.stats);

      const categories =
        statsPayload?.statistics?.splits?.categories ||
        statsPayload?.splits?.categories ||
        statsPayload?.results?.stats?.categories ||
        statsPayload?.categories;

      if (Array.isArray(categories)) {
        for (const cat of categories) addStatArray(cat?.stats);
      }

      return map;
    }

    function num(v) {
      if (v == null) return null;
      const n = typeof v === "number" ? v : parseFloat(String(v).replace("%",""));
      return Number.isFinite(n) ? n : null;
    }

    function pickFirst(map, keys) {
      for (const k of keys) {
        if (map[k] != null) return map[k];
      }
      return null;
    }

    // A "contains" picker as a fallback when ESPN key names differ
    function pickByIncludes(map, needles) {
      const entries = Object.entries(map);
      for (const needle of needles) {
        const hit = entries.find(([k]) => k.toLowerCase().includes(needle));
        if (hit) return hit[1];
      }
      return null;
    }

    async function fetchTeamStats(teamId) {
      try {
        const url = `https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/teams/${teamId}/statistics`;
        const res = await fetch(url);
        const data = await res.json();
        const flat = toFlatStatMap(data);

        // Print real key names (so we can map reliably)
        const keys = Object.keys(flat);
        console.log(`📦 Stats key names for team ${teamId}:`, keys.slice(0, 80));

        // Try common keys first, then fallback to "includes" matching.
        const ppgRaw =
          pickFirst(flat, ["avgPoints", "pointsPerGame", "ppg"]) ??
          pickByIncludes(flat, ["points per game", "ppg", "avg points", "points/game"]);

        const papgRaw =
          pickFirst(flat, ["avgPointsAllowed", "avgPointsAgainst", "pointsAgainstPerGame", "oppg"]) ??
          pickByIncludes(flat, ["opponent points per game", "opp ppg", "points allowed", "points against per game"]);

        const marginRaw =
          pickFirst(flat, ["avgPointDifferential", "pointDifferential", "scoringMargin"]) ??
          pickByIncludes(flat, ["point differential", "scoring margin", "margin"]);

        const fgRaw =
          pickFirst(flat, ["fieldGoalPct", "fgPct", "fieldGoalPercentage"]) ??
          pickByIncludes(flat, ["field goal pct", "fg%","field goal percentage"]);

        const ppg = num(ppgRaw);
        const papg = num(papgRaw);
        const margin = num(marginRaw);

        let fgPct = num(fgRaw);
        if (fgPct != null && fgPct > 0 && fgPct <= 1) fgPct = fgPct * 100;

        const out = {
          ppg:    ppg != null ? ppg.toFixed(1) : null,
          papg:   papg != null ? papg.toFixed(1) : null,
          margin: margin != null ? margin.toFixed(1) : null,
          fgPct:  fgPct != null ? fgPct.toFixed(1) : null
        };

        console.log(`✅ Computed team stats ${teamId}:`, out);
        return out;

      } catch (e) {
        console.error(`❌ Stats fetch failed for team ${teamId}:`, e);
        return null;
      }
    }

    function findSpread(oddsData, homeTeam, awayTeam) {
      const match = (oddsData || []).find(game =>
        game.home_team?.toLowerCase().includes(homeTeam.toLowerCase().split(" ").pop()) ||
        game.away_team?.toLowerCase().includes(awayTeam.toLowerCase().split(" ").pop())
      );
      if (!match) return null;
      const market = match.bookmakers?.[0]?.markets?.find(m => m.key === "spreads");
      if (!market) return null;
      return market.outcomes.map(o => `${o.name} ${o.point > 0 ? "+" : ""}${o.point}`).join(" / ");
    }

    function buildBullets(event, home, away) {
      const bullets = [];
      const competition = event.competitions?.[0];
      const homeSeed = home?.curatedRank?.current;
      const awaySeed = away?.curatedRank?.current;
      if (homeSeed && homeSeed <= 16) bullets.push(`🌱 ${home.team.shortDisplayName} is the #${homeSeed} seed`);
      if (awaySeed && awaySeed <= 16) bullets.push(`🌱 ${away.team.shortDisplayName} is the #${awaySeed} seed`);
      if (competition?.neutralSite) bullets.push("📍 Neutral site game");
      if (competition?.conferenceCompetition) bullets.push("🏟 Conference matchup");
      const venue = competition?.venue;
      if (venue?.fullName) bullets.push(`📍 ${venue.fullName}${venue.address?.city ? ", " + venue.address.city : ""}`);
      return bullets;
    }

    function statBlock(stats, teamName) {
      if (!stats || (!stats.ppg && !stats.papg && !stats.fgPct && !stats.margin)) {
        return `
          <div class="text-center">
            <p class="text-xs font-bold text-gray-400 mb-1">${teamName}</p>
            <p class="text-xs text-gray-300">Stats N/A</p>
          </div>`;
      }

      const marginColor = stats.margin
        ? (parseFloat(stats.margin) >= 0 ? "text-green-600" : "text-red-500")
        : "text-gray-400";

      return `
        <div class="text-center">
          <p class="text-xs font-black text-gray-500 uppercase tracking-wide mb-2">${teamName}</p>
          <div class="flex justify-center flex-wrap gap-2">
            ${stats.ppg ? `
            <div class="bg-orange-50 border border-orange-100 rounded-xl px-3 py-2">
              <p class="text-xs text-orange-400 leading-none mb-1">PPG</p>
              <p class="text-base font-black text-orange-600">${stats.ppg}</p>
            </div>` : ""}
            ${stats.papg ? `
            <div class="bg-blue-50 border border-blue-100 rounded-xl px-3 py-2">
              <p class="text-xs text-blue-400 leading-none mb-1">OPP PPG</p>
              <p class="text-base font-black text-blue-600">${stats.papg}</p>
            </div>` : ""}
            ${stats.margin ? `
            <div class="bg-gray-50 border border-gray-100 rounded-xl px-3 py-2">
              <p class="text-xs text-gray-400 leading-none mb-1">MARGIN</p>
              <p class="text-base font-black ${marginColor}">${parseFloat(stats.margin) > 0 ? "+" : ""}${stats.margin}</p>
            </div>` : ""}
            ${stats.fgPct ? `
            <div class="bg-purple-50 border border-purple-100 rounded-xl px-3 py-2">
              <p class="text-xs text-purple-400 leading-none mb-1">FG%</p>
              <p class="text-base font-black text-purple-600">${stats.fgPct}%</p>
            </div>` : ""}
          </div>
        </div>`;
    }

    function buildCard(event, oddsData, teamStatsMap) {
      const competition = event.competitions?.[0];
      const competitors = competition?.competitors || [];
      const home = competitors.find(c => c.homeAway === "home");
      const away = competitors.find(c => c.homeAway === "away");

      const homeName = home?.team?.displayName || "Home";
      const awayName = away?.team?.displayName || "Away";
      const homeShort = home?.team?.shortDisplayName || homeName;
      const awayShort = away?.team?.shortDisplayName || awayName;
      const homeId = home?.team?.id;
      const awayId = away?.team?.id;

      const homeLogo = home?.team?.logo || "";
      const awayLogo = away?.team?.logo || "";
      const homeRecord = home?.records?.[0]?.summary || "";
      const awayRecord = away?.records?.[0]?.summary || "";

      const broadcast = competition?.broadcasts?.map(b => b.names?.join(", ")).join(", ") || "TBD";
      const gameTime = new Date(event.date).toLocaleTimeString("en-US", {
        hour: "numeric", minute: "2-digit", timeZoneName: "short"
      });
      const isLive = event.status?.type?.state === "in";
      const spread = findSpread(oddsData, homeShort, awayShort) || "Spread N/A";
      const bullets = buildBullets(event, home, away);

      const homeStats = teamStatsMap[homeId] || null;
      const awayStats = teamStatsMap[awayId] || null;

      return `
        <div class="game-card bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
          <div class="flex justify-between items-center mb-4">
            <span class="text-xs font-semibold uppercase tracking-widest ${isLive ? 'text-green-500' : 'text-gray-400'}">
              ${isLive ? '🔴 LIVE' : '🗓 ' + gameTime}
            </span>
            <span class="text-xs font-semibold bg-blue-50 text-blue-500 px-3 py-1 rounded-full border border-blue-100">
              📺 ${broadcast}
            </span>
          </div>

          <div class="flex items-center justify-between gap-4">
            <div class="flex flex-col items-center text-center w-1/3">
              <img src="${awayLogo}" alt="${awayShort}" class="w-16 h-16 object-contain mb-2" onerror="this.style.display='none'"/>
              <p class="font-bold text-lg leading-tight text-gray-900">${awayShort}</p>
              <p class="text-gray-400 text-sm">${awayRecord}</p>
            </div>
            <div class="flex flex-col items-center w-1/3">
              <p class="text-3xl font-black text-gray-200">VS</p>
              <p class="text-xs text-amber-500 font-semibold mt-1">${spread}</p>
            </div>
            <div class="flex flex-col items-center text-center w-1/3">
              <img src="${homeLogo}" alt="${homeShort}" class="w-16 h-16 object-contain mb-2" onerror="this.style.display='none'"/>
              <p class="font-bold text-lg leading-tight text-gray-900">${homeShort}</p>
              <p class="text-gray-400 text-sm">${homeRecord}</p>
            </div>
          </div>

          <div class="mt-5 border-t border-gray-100 pt-4 grid grid-cols-2 gap-4">
            ${statBlock(awayStats, awayShort)}
            ${statBlock(homeStats, homeShort)}
          </div>

          ${bullets.length > 0 ? `
          <ul class="mt-4 border-t border-gray-100 pt-4 space-y-1">
            ${bullets.map(b => `<li class="text-sm text-gray-500">• ${b}</li>`).join("")}
          </ul>` : ""}
        </div>
      `;
    }

    async function loadGames() {
      const container = document.getElementById("games-container");

      try {
        const [espnRes, oddsRes] = await Promise.all([fetch(ESPN_URL), fetch(ODDS_URL)]);
        const espnData = await espnRes.json();
        const oddsData = await oddsRes.json();

        console.log("✅ ESPN loaded:", espnData);
        console.log("✅ Odds loaded:", oddsData);

        const events = espnData?.events || [];
        if (events.length === 0) {
          container.innerHTML = `<p class="text-center text-gray-400 text-lg">No games scheduled today.</p>`;
          return;
        }

        const teamIds = [...new Set(
          events.flatMap(ev => (ev.competitions?.[0]?.competitors || []).map(c => c.team?.id).filter(Boolean))
        )];

        const statsResults = await Promise.all(teamIds.map(id => fetchTeamStats(id)));
        const teamStatsMap = {};
        teamIds.forEach((id, i) => { teamStatsMap[id] = statsResults[i]; });

        console.log("✅ Team stats loaded for", teamIds.length, "teams");

        container.innerHTML = events.map(event => buildCard(event, oddsData || [], teamStatsMap)).join("");

      } catch (err) {
        container.innerHTML = `<p class="text-center text-red-400">Failed to load games. Please try again later.</p>`;
        console.error("💥 Global error:", err);
      }
    }

    loadGames();
  </script>
</body>
</html>
